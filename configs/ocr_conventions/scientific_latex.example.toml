[[rules]]
id = "caption.figure_or_table_prefix"
backend = "*"
object_type = "*"
text_regex = "^\\s*(Figure|Fig\\.|Table)\\s+\\d+(\\.\\d+)?"
normalised_type = "caption"

[[rules]]
id = "figure.placeholder_fig_near_caption"
backend = "*"
object_type = "*"
text_regex = "^\\s*FIG\\s*$"
requires_near_caption_regex = "^\\s*(Figure|Fig\\.)\\s+\\d+"
normalised_type = "picture"

[[rules]]
id = "footnote.leading_digit_without_space"
backend = "*"
object_type = "*"
text_regex = "^\\s*(\\d+)([A-Za-z].*)"
normalised_text_rewrite = "\\1 \\2"
normalised_type = "footnote"

[[rules]]
id = "footnote.superscript_marker"
backend = "*"
object_type = "*"
text_regex = "^\\s*([¹²³⁴⁵⁶⁷⁸⁹])\\s*([A-Za-z].*)"
normalised_text_rewrite = "1 \\2"
normalised_type = "footnote"

[[rules]]
id = "footnote.caret_marker"
backend = "*"
object_type = "*"
text_regex = "^\\s*\\^(\\d+)\\s*([A-Za-z].*)"
normalised_text_rewrite = "\\1 \\2"
normalised_type = "footnote"

[[rules]]
id = "footnote.parenthesised_marker"
backend = "*"
object_type = "*"
text_regex = "^\\s*\\((\\d+)\\)\\s*([A-Za-z].*)"
normalised_text_rewrite = "\\1 \\2"
normalised_type = "footnote"

[[rules]]
id = "footnote.bottom_page_body"
backend = "*"
object_type = "*"
text_regex = "^\\s*\\d+\\s+[A-Za-z].*"
normalised_type = "footnote"

[[rules]]
id = "equation.parenthesised_label"
backend = "*"
object_type = "*"
text_regex = "\\(\\s*(\\d+(\\.\\d+)*)\\s*\\)\\s*$"
extract_equation_label = true

[[rules]]
id = "equation.latex_tag_label"
backend = "*"
object_type = "*"
text_regex = "\\\\tag\\{\\s*(\\d+(\\.\\d+)*)\\s*\\}"
extract_equation_label = true

[[rules]]
id = "equation.number_split_block"
backend = "paddleocr"
object_type = "*"
text_regex = "^\\s*\\(\\s*\\d+(\\.\\d+)*\\s*\\)\\s*$"
normalised_type = "equation_number"
merge_with_nearby_formula = true

[[rules]]
id = "table.flattened_paragraph"
backend = "*"
object_type = "*"
text_regex = "^\\s*Table\\s+\\d+[:\\s].+"
normalised_type = "table"

[[rules]]
id = "deepseek.geometryless_exact_text_merge_hint"
backend = "deepseek"
object_type = "*"
text_regex = ".+"
geometry_required = false
merge_when_text_exact = true
